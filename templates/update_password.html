<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый пароль - EduSmart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="glass-container">
        <h2>Новый пароль</h2>
        <p>Придумайте сложный пароль.</p>
        <form id="updateForm" method="POST">
            <input type="hidden" id="access_token" name="access_token">
            <input type="password" name="password" placeholder="Новый пароль" required minlength="6">
            <button type="submit">Сохранить</button>
        </form>
    </div>

    <script>
        // Скрипт для извлечения токена из # хеша URL
        window.onload = function() {
            const hash = window.location.hash;
            if (hash) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                const token = params.get('access_token');
                if (token) {
                    document.getElementById('access_token').value = token;
                }
            }
        };
    </script>
</body>
</html>
