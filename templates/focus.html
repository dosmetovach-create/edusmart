<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode | EduSmart AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: url('/static/backiee-314483.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }
        .focus-card {
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 380px;
        }
        .timer-display { font-size: 85px; font-weight: 700; margin: 20px 0; letter-spacing: -3px; }
        .mode-label { text-transform: uppercase; letter-spacing: 3px; font-size: 12px; opacity: 0.6; color: #4facfe; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-top: 35px; }
        .btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 65px; height: 65px; border-radius: 22px; cursor: pointer; font-size: 22px; transition: 0.4s; }
        .btn:hover { background: #4facfe; transform: scale(1.1); }
        .btn.active { background: #4facfe; }
        .back-link { position: absolute; top: 40px; left: 40px; color: white; text-decoration: none; opacity: 0.6; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <a href="/chat" class="back-link"><i class="fas fa-arrow-left"></i> НАЗАД В ЧАТ</a>

    <div class="focus-card">
        <div id="mode" class="mode-label">ГЛУБОКАЯ РАБОТА</div>
        <div id="timer" class="timer-display">25:00</div>
        <div class="controls">
            <button class="btn" onclick="toggleTimer()" id="startBtn"><i class="fas fa-play"></i></button>
            <button class="btn" onclick="resetTimer()"><i class="fas fa-redo"></i></button>
        </div>
    </div>

    <script>
        // Инициализация данных из памяти браузера
        let timeLeft = parseInt(localStorage.getItem('focusTime')) || 25 * 60;
        let isBreak = localStorage.getItem('isBreak') === 'true';
        let isRunning = false;
        let timerId = null;

        const timerDisplay = document.getElementById('timer');
        const modeLabel = document.getElementById('mode');
        const startBtn = document.getElementById('startBtn');

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            modeLabel.textContent = isBreak ? "ВРЕМЯ ОТДЫХА" : "ГЛУБОКАЯ РАБОТА";
            
            // Сохраняем текущее время и режим
            localStorage.setItem('focusTime', timeLeft);
            localStorage.setItem('isBreak', isBreak);
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                startBtn.innerHTML = '<i class="fas fa-play"></i>';
                startBtn.classList.remove('active');
            } else {
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        switchMode();
                    }
                }, 1000);
                startBtn.innerHTML = '<i class="fas fa-pause"></i>';
                startBtn.classList.add('active');
            }
            isRunning = !isRunning;
        }

        function switchMode() {
            isBreak = !isBreak;
            timeLeft = isBreak ? 5 * 60 : 25 * 60;
            updateDisplay();
            isRunning = false;
            startBtn.innerHTML = '<i class="fas fa-play"></i>';
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            isBreak = false;
            timeLeft = 25 * 60;
            localStorage.removeItem('focusTime');
            localStorage.removeItem('isBreak');
            updateDisplay();
        }

        // Запуск отображения при загрузке страницы
        updateDisplay();
    </script>
    <!-- Vercel Speed Insights -->
    <script src="{{ url_for('static', filename='speed-insights.js') }}" defer></script>
</body>
</html>
