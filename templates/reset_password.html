<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля | EduSmart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-key"></i>
            <h2>Забыли пароль?</h2>
            <p>Введите ваш Email, и мы отправим ссылку для восстановления</p>
        </div>

        <!-- Уведомления об ошибках или успехе -->
        {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
        {% if message %}<div class="alert success">{{ message }}</div>{% endif %}

        <form action="/reset_password" method="POST" class="auth-form">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <button type="submit" class="auth-btn">Отправить ссылку</button>
        </form>

        <div class="auth-footer">
            <a href="/login"><i class="fas fa-arrow-left"></i> Вернуться к входу</a>
        </div>
    </div>
</body>
</html>
