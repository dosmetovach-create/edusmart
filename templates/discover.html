<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart | Интеллектуальный поиск</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --accent: #bd00ff;
            --glass: rgba(15, 15, 15, 0.6);
            --border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            background: url('/static/backiee-314483.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; flex-direction: column; color: white; overflow: hidden;
        }

        /* Навигация с неоновым свечением */
        .nav-bar {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(25px);
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        
        .logo { 
            font-family: 'Space+Grotesk', sans-serif;
            font-weight: 700; font-size: 24px; letter-spacing: 1px;
        }
        .logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }

        .nav-links { display: flex; gap: 15px; }
        .nav-btn {
            color: rgba(255, 255, 255, 0.6); text-decoration: none; font-size: 13px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px; padding: 10px 20px;
            border-radius: 15px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
        }
        .nav-btn:hover { 
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        .nav-btn.active { 
            background: rgba(79, 172, 254, 0.15); 
            color: var(--primary); 
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
        }

        /* Основная область */
        .main-container {
            flex-grow: 1;
            max-width: 1100px;
            margin: 40px auto;
            width: 95%;
            display: flex; flex-direction: column; gap: 30px;
            overflow: hidden;
        }

        /* Футуристичный поиск */
        .search-section {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border-radius: 35px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .search-section::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .search-header h2 { 
            font-family: 'Space+Grotesk', sans-serif;
            font-size: 32px; margin: 0; font-weight: 700; 
        }
        
        .search-input-group {
            display: flex; gap: 15px; margin-top: 25px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px; border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input[type="text"] {
            flex-grow: 1; background: transparent;
            border: none; padding: 15px 25px;
            color: white; font-size: 16px; outline: none;
            font-family: 'Inter', sans-serif;
        }
        input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.3); }

        .find-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; color: white;
            padding: 0 40px; border-radius: 20px;
            font-weight: 700; font-family: 'Space+Grotesk', sans-serif;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }
        .find-btn:hover { 
            transform: scale(1.02) translateY(-2px); 
            box-shadow: 0 15px 30px rgba(79, 172, 254, 0.5);
        }

        /* Сетка результатов */
        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); 
            gap: 25px; overflow-y: auto; padding: 10px 10px 100px 10px;
        }
        
        /* Стилизация скроллбара */
        .results-grid::-webkit-scrollbar { width: 6px; }
        .results-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .material-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 30px; padding: 30px;
            display: flex; flex-direction: column;
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            animation: cardSlideUp 0.6s ease forwards;
        }

        .material-card:hover { 
            background: rgba(255, 255, 255, 0.05); 
            border-color: var(--secondary);
            transform: translateY(-10px) scale(1.01);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .card-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .card-tag {
            font-size: 11px; font-weight: 800; color: var(--secondary);
            text-transform: uppercase; letter-spacing: 2px;
            background: rgba(0, 242, 254, 0.1); padding: 5px 12px; border-radius: 8px;
        }
        .save-btn { color: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; }
        .save-btn:hover { color: var(--accent); }

        .card-title {
            font-size: 20px; font-weight: 700; margin-bottom: 15px;
            color: white; text-decoration: none; line-height: 1.3;
            font-family: 'Space+Grotesk', sans-serif;
        }
        
        .ai-insight-box {
            margin-top: auto;
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.08), rgba(189, 0, 255, 0.05));
            border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .ai-insight-box i {
            position: absolute; right: 15px; top: -10px;
            background: var(--primary); color: white;
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; box-shadow: 0 0 10px var(--primary);
        }

        .ai-text {
            font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85);
            font-style: italic;
        }

        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Индикатор загрузки */
        .loader {
            display: none; grid-column: 1/-1; text-align: center; padding: 50px;
        }
        .pulse {
            width: 60px; height: 60px; background: var(--primary);
            border-radius: 50%; margin: 0 auto 20px;
            animation: pulse-ring 1.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(.33); opacity: 1; }
            80%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="logo">EduSmart <span>AI</span></div>
        <div class="nav-links">
            <a href="/chat" class="nav-btn"><i class="fas fa-comment-dots"></i> Интеллект</a>
            <a href="/discover" class="nav-btn active"><i class="fas fa-wand-magic-sparkles"></i> Подбор</a>
            <a href="/tracker" class="nav-btn"><i class="fas fa-layer-group"></i> Прогресс</a>
            <a href="/focus" class="nav-btn"><i class="fas fa-brain"></i> Фокус</a>
        </div>
    </div>

    <div class="main-container">
        <div class="search-section">
            <div class="search-header">
                <h2>Библиотека идей</h2>
                <p style="opacity:0.5; font-size: 15px; margin-top: 8px;">Персональный подбор статей для твоей книги, дизайна и диплома</p>
            </div>
            <div class="search-input-group">
                <input type="text" id="topicInput" placeholder="О чем хочешь узнать сегодня? (напр. Психология цвета в одежде)">
                <button class="find-btn" onclick="searchMaterials()">
                    <i class="fas fa-magnifying-glass"></i> ИСКАТЬ
                </button>
            </div>
        </div>

        <div class="results-grid" id="resultsGrid">
            <div style="grid-column: 1/-1; text-align:center; opacity:0.3; padding-top: 50px;">
                <i class="fas fa-search-nodes" style="font-size: 50px; margin-bottom: 20px;"></i>
                <p>Введи тему, чтобы ИИ просканировал сеть</p>
            </div>
        </div>
        
        <div id="loader" class="loader">
            <div class="pulse"></div>
            <p style="font-family: 'Space+Grotesk'; letter-spacing: 2px;">АНАЛИЗИРУЮ ИСТОЧНИКИ...</p>
        </div>
    </div>

    <script>
        async function searchMaterials() {
            const topic = document.getElementById('topicInput').value;
            const grid = document.getElementById('resultsGrid');
            const loader = document.getElementById('loader');
            
            if(!topic) return;

            grid.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch('/search_materials', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({topic: topic})
                });
                const data = await res.json();
                
                grid.innerHTML = '';
                data.forEach((item, index) => {
                    const delay = index * 0.1;
                    grid.innerHTML += `
                        <div class="material-card" style="animation-delay: ${delay}s">
                            <div class="card-meta">
                                <div class="card-tag">Research Paper</div>
                                <i class="far fa-bookmark save-btn"></i>
                            </div>
                            <a href="${item.url}" target="_blank" class="card-title">${item.title}</a>
                            <div class="ai-insight-box">
                                <i class="fas fa-robot"></i>
                                <div class="ai-text">
                                    ${item.ai_insight || "Материал идеально подходит под твой запрос."}
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                grid.innerHTML = '<p>Произошла ошибка при поиске. Попробуй позже.</p>';
            } finally {
                loader.style.display = 'none';
                grid.style.display = 'grid';
            }
        }
    </script>
</body>
</html>
